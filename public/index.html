<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>毛毛さんへ</title>
    <style>
      body {
        font-family: sans-serif;
        background-color: #fff8f0;
        color: #333;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 4rem;
        line-height: 1.8;
      }
      h1 {
        color: #cc3366;
        margin-bottom: 1rem;
      }
      p {
        max-width: 600px;
        font-size: 1.2rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <h1>毛毛さんへ</h1>
    <p>
      あなたと出会えて、本当によかった。<br />
      日々の優しさと、ささやかな笑いに、心から感謝しています。<br />
      このページが、ほんの少しでも想いを伝えるきっかけになればうれしいです。<br />
      これからも、一緒に笑って、一緒に歩んでいけますように。
    </p>
  </body>
</html>
